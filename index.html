<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WARRING!</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="warring-signaling-base" content="/api">
  <link rel="icon" href="data:,">
  <style>
    :root {
      --y: #ffd400;
      --p: #7b2cf5;
      --g: #00e676;
      --r: #ff1744;
      --b: #00b0ff;
      --blk: #111;
      --cream: #fffbe5;
      --glass: rgba(255, 255, 255, 0.22);
      --glass-strong: rgba(255, 255, 255, 0.34);
      --ink: #1b1f35;
      --hud-line: rgba(255, 255, 255, 0.52);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 210, 92, 0.28) 0%, transparent 24%),
        radial-gradient(circle at 82% 10%, rgba(152, 123, 255, 0.22) 0%, transparent 26%),
        linear-gradient(180deg, #eff7ff 0%, #d8e8ff 42%, #c9d9fb 100%);
      overscroll-behavior: none;
    }

    body {
      font-family: "Avenir Next", "Trebuchet MS", system-ui, sans-serif;
      color: #fff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    button,
    input {
      font: inherit;
    }

    #app {
      max-width: 500px;
      margin: 0 auto;
      height: 100dvh;
      background:
        radial-gradient(circle at 15% 14%, rgba(255, 255, 255, 0.46) 0%, transparent 18%),
        radial-gradient(circle at 84% 12%, rgba(197, 218, 255, 0.5) 0%, transparent 22%),
        linear-gradient(180deg, rgba(255, 247, 188, 0.96) 0%, rgba(245, 226, 145, 0.92) 48%, rgba(219, 205, 253, 0.9) 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.72) inset, 0 28px 80px rgba(40, 67, 124, 0.22);
      container-type: inline-size;
    }

    #app::before,
    #app::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(10px);
      opacity: 0.8;
    }

    #app::before {
      width: 34cqw;
      height: 34cqw;
      left: -8cqw;
      top: 8cqw;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.08) 72%, transparent 100%);
    }

    #app::after {
      width: 28cqw;
      height: 28cqw;
      right: -6cqw;
      bottom: 12cqw;
      background: radial-gradient(circle, rgba(123, 44, 245, 0.24) 0%, rgba(123, 44, 245, 0.06) 68%, transparent 100%);
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .logo {
      margin: 6vh auto 2vh;
      text-align: center;
      filter: drop-shadow(0 10px 18px rgba(45, 41, 72, 0.2));
      z-index: 1;
    }

    .logo span {
      display: block;
      font-size: clamp(36px, 12cqw, 68px);
      line-height: 0.78;
      padding: 6px 16px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: 0 12px 28px rgba(44, 57, 92, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    @keyframes floatTitle1 {
      0%,
      100% {
        transform: rotate(2deg) translateY(3px) scale(1);
      }

      50% {
        transform: rotate(5deg) translateY(-2px) scale(1.05);
      }
    }

    @keyframes floatTitle2 {
      0%,
      100% {
        transform: rotate(-2deg) translateY(-3px) scale(1);
        margin-top: -5px;
      }

      50% {
        transform: rotate(-5deg) translateY(2px) scale(1.05);
        margin-top: -5px;
      }
    }

    .logo span:first-child {
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(245,243,255,0.84) 100%);
      color: #6540d8;
      animation: floatTitle1 2s ease-in-out infinite;
    }

    .logo span:last-child {
      background: linear-gradient(180deg, rgba(255,111,145,0.94) 0%, rgba(255,75,119,0.86) 100%);
      color: #fffdfd;
      animation: floatTitle2 2.2s ease-in-out infinite;
      animation-delay: -1s;
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.64) 0%, rgba(255,247,233,0.52) 100%);
      backdrop-filter: blur(18px) saturate(1.15);
      -webkit-backdrop-filter: blur(18px) saturate(1.15);
      color: var(--ink);
      margin: 10px 16px 18px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(35, 62, 115, 0.16), inset 0 1px 0 rgba(255,255,255,0.55);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
    }

    .btn {
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      padding: 16px;
      font-size: clamp(16px, 4.4cqw, 22px);
      font-weight: 900;
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(37, 55, 107, 0.18), inset 0 1px 0 rgba(255,255,255,0.7);
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .pulse-btn {
      animation: menuPulse 1.8s ease-in-out infinite;
    }

    @keyframes menuPulse {
      0%,
      100% {
        transform: translateY(0) scale(1);
        box-shadow: 0 10px 24px rgba(37, 55, 107, 0.18), inset 0 1px 0 rgba(255,255,255,0.7);
      }

      50% {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 16px 30px rgba(37, 55, 107, 0.22), inset 0 1px 0 rgba(255,255,255,0.82);
      }
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 5px 12px rgba(37, 55, 107, 0.16);
      filter: brightness(0.96);
    }

    .btn[disabled] {
      opacity: 0.6;
      cursor: wait;
    }

    .blue {
      background: linear-gradient(180deg, rgba(96, 208, 255, 0.9) 0%, rgba(42, 161, 255, 0.82) 100%);
      color: #fff;
    }

    .yellow {
      background: linear-gradient(180deg, rgba(255, 234, 126, 0.94) 0%, rgba(255, 204, 0, 0.84) 100%);
      color: #352a00;
    }

    .green {
      background: linear-gradient(180deg, rgba(121, 245, 187, 0.92) 0%, rgba(24, 214, 130, 0.84) 100%);
      color: #083320;
    }

    .red {
      background: linear-gradient(180deg, rgba(255, 121, 156, 0.94) 0%, rgba(255, 76, 118, 0.84) 100%);
      color: #fff;
    }

    .subtle {
      background: linear-gradient(180deg, rgba(255,255,255,0.86) 0%, rgba(241,246,255,0.8) 100%);
      color: var(--ink);
    }

    .mode-panel {
      display: none;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,242,205,0.52) 100%);
      padding: 12px;
      gap: 10px;
      flex-direction: column;
      align-items: center;
    }

    .mode-panel.active {
      display: flex;
    }

    .small {
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .row {
      display: flex;
      width: 100%;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: stretch;
      text-align: left;
    }

    .field label {
      font-family: system-ui, sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 14px;
      background: rgba(255, 254, 247, 0.78);
      padding: 8px 12px;
      font-size: clamp(18px, 7cqw, 32px);
      letter-spacing: 0.12em;
      word-break: break-word;
    }

    .textish {
      min-height: 48px;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 14px;
      background: rgba(255, 254, 247, 0.78);
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      line-height: 1.3;
      word-break: break-all;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 14px;
      background: rgba(255, 254, 247, 0.8);
      padding: 12px;
      text-transform: uppercase;
      font-size: 20px;
      letter-spacing: 0.12em;
      text-align: center;
    }

    #stat {
      min-height: 32px;
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    #stat.warn {
      color: #7a2f00;
    }

    #stat.error {
      color: #8f0024;
    }

    #stat.success {
      color: #006d37;
    }

    .hud {
      height: 56px;
      background: linear-gradient(180deg, rgba(73, 93, 148, 0.52) 0%, rgba(56, 71, 121, 0.62) 100%);
      backdrop-filter: blur(20px) saturate(1.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
      font-size: 19px;
      border-bottom: 1px solid var(--hud-line);
      letter-spacing: 0.5px;
      z-index: 20;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(140, 220, 255, 0.3) 0%, transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(255, 184, 226, 0.28) 0%, transparent 24%),
        radial-gradient(circle at 52% 92%, rgba(255, 228, 92, 0.16) 0%, transparent 32%),
        linear-gradient(180deg, #8db4ff 0%, #6489d9 52%, #5569be 100%);
    }

    .instr {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: clamp(25px, 12cqw, 70px);
      font-weight: 900;
      color: #fff;
      -webkit-text-stroke: clamp(1px, 0.5cqw, 2px) rgba(30, 38, 73, 0.45);
      text-shadow: 0 8px 18px rgba(36, 52, 103, 0.28);
      pointer-events: none;
      z-index: 100;
      text-align: center;
      padding: 0 5%;
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .instr-card {
      max-width: min(88%, 420px);
      padding: 22px 20px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.14) 100%);
      border: 1px solid rgba(255,255,255,0.52);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 18px 48px rgba(48, 73, 138, 0.18), inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .instr-title {
      display: block;
      font-size: clamp(30px, 11cqw, 72px);
      line-height: 0.95;
    }

    .instr-hint {
      display: block;
      margin-top: 12px;
      font-size: clamp(16px, 4.8cqw, 28px);
      line-height: 1.12;
      letter-spacing: 0.04em;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.2) rotate(-10deg);
        opacity: 0;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes up {
      to {
        transform: translateY(-120vh);
      }
    }

    @keyframes reactionFloat {
      0% {
        transform: translateY(24px) scale(0.7);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateY(-42px) scale(1.08);
        opacity: 0;
      }
    }

    .fly {
      position: absolute;
      font-size: clamp(40px, 18cqw, 90px);
      transition: all 0.25s ease-in-out;
      filter: drop-shadow(0 5px 0 #000);
      cursor: pointer;
    }

    .balloon {
      position: absolute;
      font-size: clamp(36px, 16cqw, 80px);
      animation: up 2.8s linear forwards;
      cursor: pointer;
    }

    .dontbtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: clamp(100px, 44cqw, 220px);
      height: clamp(100px, 44cqw, 220px);
      border: 6px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 8cqw, 40px);
      color: #fff;
      box-shadow: 0 8px 0 #000;
      cursor: pointer;
      touch-action: none;
    }

    .find-item {
      position: absolute;
      font-size: clamp(30px, 13cqw, 70px);
      cursor: pointer;
    }

    .connected-panel {
      display: none;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(233, 245, 255, 0.64) 0%, rgba(219, 236, 255, 0.58) 100%);
      padding: 12px;
      gap: 10px;
      flex-direction: column;
    }

    .connected-panel.active {
      display: flex;
    }

    .chat-log {
      min-height: 168px;
      max-height: 240px;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-msg {
      font-family: system-ui, sans-serif;
      font-size: 12px;
      line-height: 1.35;
      background: #ffdfe3;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 12px;
      padding: 8px 10px;
      align-self: flex-start;
      max-width: 88%;
    }

    .chat-msg.me {
      background: #fff3ba;
      align-self: flex-end;
    }

    .chat-msg.room {
      background: #eadbff;
      align-self: center;
    }

    .chat-name {
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .chat-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    #chatInput {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      text-transform: none;
      letter-spacing: normal;
      text-align: left;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="lobby" class="screen active">
      <div class="logo"><span>WARRING</span><span>FOLKS!</span></div>
      <div class="card">
        <button id="soloBtn" class="btn green pulse-btn">SOLO MODE</button>
        <button id="hostBtn" class="btn blue pulse-btn">HOST GAME</button>
        <button id="joinBtn" class="btn yellow pulse-btn">JOIN GAME</button>

        <section id="hostPanel" class="mode-panel" aria-live="polite">
          <p class="small"><b>HOST A ROOM</b><br>Create a room code, share the join link, wait for chaos.</p>
          <button id="createRoomBtn" class="btn blue">CREATE ROOM</button>
          <div class="field">
            <label for="roomCodeDisplay">Room Code</label>
            <div id="roomCodeDisplay" class="pill">------</div>
          </div>
          <div class="field">
            <label for="joinLinkDisplay">Join Link</label>
            <div id="joinLinkDisplay" class="textish">Create a room first.</div>
          </div>
          <div class="row">
            <button id="copyCodeBtn" class="btn yellow">COPY CODE</button>
            <button id="copyLinkBtn" class="btn yellow">COPY LINK</button>
          </div>
          <div class="row">
            <button id="hostResetBtn" class="btn subtle">BACK</button>
          </div>
        </section>

        <section id="joinPanel" class="mode-panel" aria-live="polite">
          <p class="small"><b>JOIN A ROOM</b><br>Enter a room code or open a shared join link.</p>
          <div class="field">
            <label for="roomCodeInput">Room Code</label>
            <input id="roomCodeInput" type="text" inputmode="latin" autocomplete="off" maxlength="6"
              placeholder="ABC123">
          </div>
          <div class="row">
            <button id="joinRoomBtn" class="btn blue">JOIN CODE</button>
            <button id="joinResetBtn" class="btn subtle">BACK</button>
          </div>
        </section>

        <section id="connectedPanel" class="connected-panel" aria-live="polite">
          <p id="connectedTitle" class="small"><b>ROOM READY</b><br>Chat, taunt, then start the match.</p>
          <div id="chatLog" class="chat-log"></div>
          <div class="chat-row">
            <input id="chatInput" type="text" maxlength="90" placeholder="Short message...">
            <button id="chatSendBtn" class="btn blue" style="max-width:120px">SEND</button>
          </div>
          <div class="row">
            <button id="startMatchBtn" class="btn green">START MATCH</button>
            <button id="leaveRoomBtn" class="btn yellow">LEAVE ROOM</button>
          </div>
        </section>

        <p id="stat"></p>
      </div>
    </div>

    <div id="game" class="screen">
      <div class="hud">
        <div id="hud-left">YOU <b id="ms">0</b></div>
        <div id="hud-mid">R<b id="rn">1</b>/9</div>
        <div id="hud-right">OPP <b id="os">0</b></div>
      </div>
      <div id="gameArea"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>

</html>
