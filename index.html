<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WARRING!</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="warring-signaling-base" content="/api">
  <link rel="icon" href="data:,">
  <style>
    :root {
      --y: #ffd400;
      --p: #7b2cf5;
      --g: #00e676;
      --r: #ff1744;
      --b: #00b0ff;
      --blk: #111;
      --cream: #fffbe5;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at top, #3f005f 0%, #1a0030 48%, #11001d 100%);
      overscroll-behavior: none;
    }

    body {
      font-family: Impact, "Arial Black", system-ui, sans-serif;
      color: #fff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    button,
    input {
      font: inherit;
    }

    #app {
      max-width: 500px;
      margin: 0 auto;
      height: 100dvh;
      background: linear-gradient(180deg, #ffe45c 0%, var(--y) 48%, #f6b400 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 4px #000 inset;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .logo {
      margin: 6vh auto 2vh;
      text-align: center;
      filter: drop-shadow(0 6px 0 #000);
      z-index: 1;
    }

    .logo span {
      display: block;
      font-size: clamp(36px, 12vw, 68px);
      line-height: 0.78;
      padding: 6px 16px;
      border: 5px solid #000;
      font-weight: 900;
      letter-spacing: 1px;
    }

    @keyframes floatTitle1 {
      0%,
      100% {
        transform: rotate(2deg) translateY(3px) scale(1);
      }

      50% {
        transform: rotate(5deg) translateY(-2px) scale(1.05);
      }
    }

    @keyframes floatTitle2 {
      0%,
      100% {
        transform: rotate(-2deg) translateY(-3px) scale(1);
        margin-top: -5px;
      }

      50% {
        transform: rotate(-5deg) translateY(2px) scale(1.05);
        margin-top: -5px;
      }
    }

    .logo span:first-child {
      background: #fff;
      color: var(--p);
      animation: floatTitle1 2s ease-in-out infinite;
    }

    .logo span:last-child {
      background: var(--r);
      color: #fff;
      animation: floatTitle2 2.2s ease-in-out infinite;
      animation-delay: -1s;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      color: #000;
      margin: 10px 16px 18px;
      padding: 15px;
      border: 4px solid #000;
      border-radius: 20px;
      box-shadow: 0 7px 0 #000;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
    }

    .btn {
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      padding: 16px;
      font-size: clamp(16px, 4.4vw, 22px);
      font-weight: 900;
      border: 4px solid #000;
      border-radius: 14px;
      box-shadow: 0 5px 0 #000;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.1s;
      background: #fff;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #000;
      filter: brightness(0.9);
    }

    .btn[disabled] {
      opacity: 0.6;
      cursor: wait;
    }

    .blue {
      background: var(--b);
      color: #fff;
    }

    .yellow {
      background: var(--y);
      color: #000;
    }

    .green {
      background: var(--g);
      color: #000;
    }

    .red {
      background: var(--r);
      color: #fff;
    }

    .subtle {
      background: #fff;
      color: #000;
    }

    .mode-panel {
      display: none;
      width: 100%;
      border: 4px solid #000;
      border-radius: 18px;
      background: linear-gradient(180deg, #fffdf4 0%, #ffe9a0 100%);
      padding: 12px;
      gap: 10px;
      flex-direction: column;
      align-items: center;
    }

    .mode-panel.active {
      display: flex;
    }

    .small {
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .row {
      display: flex;
      width: 100%;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: stretch;
      text-align: left;
    }

    .field label {
      font-family: system-ui, sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #000;
      border-radius: 14px;
      background: var(--cream);
      padding: 8px 12px;
      font-size: clamp(18px, 7vw, 32px);
      letter-spacing: 0.12em;
      word-break: break-word;
    }

    .textish {
      min-height: 48px;
      border: 4px solid #000;
      border-radius: 14px;
      background: var(--cream);
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      line-height: 1.3;
      word-break: break-all;
    }

    input[type="text"] {
      width: 100%;
      border: 4px solid #000;
      border-radius: 14px;
      background: var(--cream);
      padding: 12px;
      text-transform: uppercase;
      font-size: 20px;
      letter-spacing: 0.12em;
      text-align: center;
    }

    #stat {
      min-height: 32px;
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    #stat.warn {
      color: #7a2f00;
    }

    #stat.error {
      color: #8f0024;
    }

    #stat.success {
      color: #006d37;
    }

    .hud {
      height: 56px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
      font-size: 19px;
      border-bottom: 4px solid #fff;
      letter-spacing: 0.5px;
      z-index: 20;
    }

    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .instr {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: clamp(25px, 12vw, 70px);
      font-weight: 900;
      color: #fff;
      -webkit-text-stroke: clamp(2px, 1vw, 5px) #000;
      text-shadow: 0 8px 0 #000;
      pointer-events: none;
      z-index: 100;
      text-align: center;
      padding: 0 5%;
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.2) rotate(-10deg);
        opacity: 0;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes up {
      to {
        transform: translateY(-120vh);
      }
    }

    .fly {
      position: absolute;
      font-size: clamp(40px, 18vw, 90px);
      transition: all 0.25s ease-in-out;
      filter: drop-shadow(0 5px 0 #000);
      cursor: pointer;
    }

    .balloon {
      position: absolute;
      font-size: clamp(36px, 16vw, 80px);
      animation: up 2.8s linear forwards;
      cursor: pointer;
    }

    .dontbtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: clamp(100px, 44vw, 220px);
      height: clamp(100px, 44vw, 220px);
      border: 6px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 8vw, 40px);
      color: #fff;
      box-shadow: 0 8px 0 #000;
      cursor: pointer;
      touch-action: none;
    }

    .find-item {
      position: absolute;
      font-size: clamp(30px, 13vw, 70px);
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="lobby" class="screen active">
      <div class="logo"><span>WARRING</span><span>FOLKS!</span></div>
      <div class="card">
        <button id="soloBtn" class="btn green">SOLO MODE</button>
        <button id="hostBtn" class="btn blue">HOST GAME</button>
        <button id="joinBtn" class="btn yellow">JOIN GAME</button>

        <section id="hostPanel" class="mode-panel" aria-live="polite">
          <p class="small"><b>HOST A ROOM</b><br>Create a room code, share the join link, wait for chaos.</p>
          <button id="createRoomBtn" class="btn blue">CREATE ROOM</button>
          <div class="field">
            <label for="roomCodeDisplay">Room Code</label>
            <div id="roomCodeDisplay" class="pill">------</div>
          </div>
          <div class="field">
            <label for="joinLinkDisplay">Join Link</label>
            <div id="joinLinkDisplay" class="textish">Create a room first.</div>
          </div>
          <div class="row">
            <button id="copyCodeBtn" class="btn yellow">COPY CODE</button>
            <button id="copyLinkBtn" class="btn yellow">COPY LINK</button>
          </div>
          <div class="row">
            <button id="hostResetBtn" class="btn subtle">BACK</button>
          </div>
        </section>

        <section id="joinPanel" class="mode-panel" aria-live="polite">
          <p class="small"><b>JOIN A ROOM</b><br>Enter a room code or open a shared join link.</p>
          <div class="field">
            <label for="roomCodeInput">Room Code</label>
            <input id="roomCodeInput" type="text" inputmode="latin" autocomplete="off" maxlength="6"
              placeholder="ABC123">
          </div>
          <div class="row">
            <button id="joinRoomBtn" class="btn blue">JOIN CODE</button>
            <button id="joinResetBtn" class="btn subtle">BACK</button>
          </div>
        </section>

        <p id="stat"></p>
      </div>
    </div>

    <div id="game" class="screen">
      <div class="hud">
        <div id="hud-left">YOU <b id="ms">0</b></div>
        <div id="hud-mid">R<b id="rn">1</b>/9</div>
        <div id="hud-right">OPP <b id="os">0</b></div>
      </div>
      <div id="gameArea"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>

</html>
