<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WARRING!</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <style>
    :root {
      --y: #FFD400;
      --p: #7B2CF5;
      --g: #00E676;
      --r: #FF1744;
      --b: #00B0FF;
      --blk: #111
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #1a0030;
      overscroll-behavior: none
    }

    body {
      font-family: Impact, 'Arial Black', system-ui, sans-serif;
      color: #fff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none
    }

    #app {
      max-width: 500px;
      margin: 0 auto;
      height: 100dvh;
      background: var(--y);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column
    }

    .screen.active {
      display: flex
    }

    .logo {
      margin: 10vh auto 2vh; /* Lowered the title */
      text-align: center;
      filter: drop-shadow(0 6px 0 #000)
    }

    .logo span {
      display: block;
      font-size: clamp(48px, 16vw, 78px);
      line-height: .78;
      padding: 6px 16px;
      border: 5px solid #000;
      font-weight: 900;
      letter-spacing: 1px
    }

    /* Title Animations */
    @keyframes floatTitle1 {
      0%, 100% { transform: rotate(2deg) translateY(3px) scale(1); }
      50% { transform: rotate(5deg) translateY(-2px) scale(1.05); }
    }
    @keyframes floatTitle2 {
      0%, 100% { transform: rotate(-2deg) translateY(-3px) scale(1); margin-top: -5px; }
      50% { transform: rotate(-5deg) translateY(2px) scale(1.05); margin-top: -5px; }
    }

    .logo span:first-child {
      background: #fff;
      color: var(--p);
      animation: floatTitle1 2s ease-in-out infinite;
    }

    .logo span:last-child {
      background: var(--r);
      color: #fff;
      animation: floatTitle2 2.2s ease-in-out infinite;
      animation-delay: -1s;
    }

    .card {
      background: #fff;
      color: #000;
      margin: 10px 16px;
      padding: 30px 16px;
      border: 4px solid #000;
      border-radius: 20px;
      box-shadow: 0 7px 0 #000;
      transition: transform 0.2s;
      text-align: center; /* Center elements inside card */
    }

    .btn {
      width: 100%;
      max-width: 320px; /* Limit width */
      display: block; /* Centering */
      margin: 12px auto; /* Centering */
      padding: 22px; /* Enlarged padding */
      font-size: 26px; /* Enlarged font */
      font-weight: 900;
      border: 4px solid #000;
      border-radius: 14px;
      box-shadow: 0 6px 0 #000;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      transition: all 0.1s;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #000;
      filter: brightness(0.9);
    }

    .blue { background: var(--b); color: #fff }
    .yellow { background: var(--y); color: #000 }
    .green { background: var(--g); color: #000 }

    textarea {
      width: 100%;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      padding: 8px;
      border: 3px solid #000;
      border-radius: 10px;
      background: #fffbe5;
      margin: 6px 0
    }

    .hud {
      height: 54px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
      font-size: 19px;
      border-bottom: 4px solid #fff;
      letter-spacing: .5px;
      z-index: 20;
    }

    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111
    }

    /* Fixed Instruction Text Sizing & Added Pop Anim */
    .instr {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: clamp(30px, 14vw, 80px);
      font-weight: 900;
      color: #fff;
      -webkit-text-stroke: clamp(2px, 1.5vw, 6px) #000;
      text-shadow: 0 8px 0 #000;
      pointer-events: none;
      z-index: 10;
      text-align: center;
      padding: 0 5%;
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .fly {
      position: absolute;
      font-size: clamp(40px, 18vw, 90px);
      transition: all 0.25s ease-in-out;
      filter: drop-shadow(0 5px 0 #000);
      cursor: pointer;
    }

    .balloon {
      position: absolute;
      font-size: clamp(36px, 16vw, 80px);
      animation: up 2.8s linear forwards;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .balloon:active { transform: scale(0.8); }

    @keyframes up {
      to { transform: translateY(-120vh) }
    }

    .basket {
      position: absolute;
      bottom: 20px;
      font-size: clamp(34px, 15vw, 75px);
      transform: translateX(-50%);
      filter: drop-shadow(0 4px 0 #000);
      transition: left 0.05s linear;
    }

    .toast {
      position: absolute;
      font-size: clamp(30px, 12vw, 60px);
    }

    .player {
      position: absolute;
      bottom: 24px;
      font-size: clamp(32px, 14vw, 70px);
      transform: translateX(-50%);
      transition: left 0.05s linear;
    }

    .banana {
      position: absolute;
      font-size: clamp(28px, 11vw, 55px);
    }

    .dontbtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: clamp(100px, 44vw, 220px);
      height: clamp(100px, 44vw, 220px);
      background: var(--r);
      border: 6px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 8vw, 40px);
      color: #fff;
      box-shadow: 0 8px 0 #000;
      cursor: pointer;
      transition: transform 0.1s ease-out, filter 0.1s;
    }
    .dontbtn:active { filter: brightness(0.8); }
    
    .find-item {
      position: absolute;
      font-size: clamp(30px, 13vw, 70px);
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .find-item:active { transform: scale(0.9); }
  </style>
</head>

<body>
  <div id="app">
    <div id="lobby" class="screen active">
      <div class="logo"><span>WARRING</span><span>FOLKS!</span></div>
      <div class="card">
        <button id="soloBtn" class="btn green">SOLO MODE</button>
        <button id="hostBtn" class="btn blue">HOST GAME</button>
        <button id="joinBtn" class="btn yellow">JOIN GAME</button>
        <div id="hostP" style="display:none">
          <p><b>1. Send this CODE to your worst friend/best enemy:</b></p><textarea id="offOut" rows="3" readonly></textarea><button class="btn yellow"
            onclick="navigator.clipboard.writeText(offOut.value)">COPY</button>
          <p><b>2. Paste their RESPONSE:</b></p><textarea id="ansIn" rows="3"></textarea><button id="goBtn"
            class="btn blue">CONNECT</button>
        </div>
        <div id="joinP" style="display:none">
          <p>Paste CODE:</p><textarea id="offIn" rows="3"></textarea><button id="makeBtn" class="btn blue">MAKE
            WARRING</button>
          <textarea id="ansOut" rows="3" readonly style="display:none"></textarea><button id="copyAns"
            class="btn yellow" style="display:none" onclick="navigator.clipboard.writeText(ansOut.value)">COPY
        </button>
        </div>
        <p id="stat" style="text-align:center;font-family:system-ui;font-size:13px"></p>
      </div>
    </div>
    <div id="game" class="screen">
      <div class="hud">
        <div>YOU <b id="ms">0</b></div>
        <div>R<b id="rn">1</b>/9</div>
        <div>OPP <b id="os">0</b></div>
      </div>
      <div id="gameArea"></div>
    </div>
  </div>
  <script>
    const $ = s => document.querySelector(s); 
    let pc, dc, host = false, my = 0, opp = 0, rnd = 1, last = '', isSolo = false, times = []; 
    
    /* --- AUDIO SYSTEM & BGM --- */
    let actx, bgmGain, sfxGain, bgmTempo = 220, bgmStep = 0, bgmTimer;
    
    const initAudio = () => {
      if (actx) return;
      actx = new (window.AudioContext || window.webkitAudioContext)();
      
      bgmGain = actx.createGain();
      bgmGain.gain.value = 0.04; // Quiet BGM
      bgmGain.connect(actx.destination);
      
      sfxGain = actx.createGain();
      sfxGain.gain.value = 0.15; // Louder SFX
      sfxGain.connect(actx.destination);
      
      playBGM();
    };
    
    // Start audio engine on first interaction
    document.addEventListener('pointerdown', initAudio, { once: true });

    const playBGM = () => {
      if (!actx || !$('#lobby').classList.contains('active') && !$('#game').classList.contains('active')) return;
      const notes = [220, 261.63, 329.63, 392.00, 440, 523.25]; // Retro arpeggio notes
      
      const playNote = () => {
        if (actx.state === 'suspended') actx.resume();
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = 'triangle';
        o.frequency.value = notes[bgmStep % notes.length];
        // Occasional zany pitch shift
        if (Math.random() > 0.9) o.frequency.value *= 1.5; 
        
        g.gain.setValueAtTime(1, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.15);
        
        o.connect(g);
        g.connect(bgmGain);
        o.start();
        o.stop(actx.currentTime + 0.15);
        
        bgmStep++;
        bgmTimer = setTimeout(playNote, bgmTempo);
      };
      playNote();
    };

    const playSFX = (f, d, vol = 1, type = 'square') => { 
      try { 
        if (!actx) initAudio();
        if (actx.state === 'suspended') actx.resume();
        const o = actx.createOscillator(); 
        const g = actx.createGain(); 
        o.type = type;
        o.frequency.value = f; 
        g.gain.setValueAtTime(vol, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + (d/1000));
        o.connect(g); 
        g.connect(sfxGain); 
        o.start(); 
        o.stop(actx.currentTime + (d / 1000)); 
      } catch (e) { } 
    };

    const sfxClick = () => playSFX(600, 50, 0.5, 'sine');
    const sfxWin = () => { playSFX(800, 100, 0.8, 'square'); setTimeout(()=>playSFX(1200, 200, 0.8, 'square'), 100); };
    const sfxLose = () => { playSFX(300, 200, 0.8, 'sawtooth'); setTimeout(()=>playSFX(250, 300, 0.8, 'sawtooth'), 150); };
    const sfxStartRound = () => playSFX(800, 70, 0.5, 'sine');

    /* --- Fireworks / Confetti Particle Engine --- */
    const fxc = document.createElement('canvas');
    fxc.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;';
    $('#app').appendChild(fxc);
    const ctx = fxc.getContext('2d');
    let pts = [];
    const resizeFx = () => { fxc.width = $('#app').offsetWidth; fxc.height = $('#app').offsetHeight; };
    window.addEventListener('resize', resizeFx);
    resizeFx();
    
    const spawnFX = (x, y, isWin) => {
      const colors = ['#FFD400', '#7B2CF5', '#00E676', '#FF1744', '#00B0FF', '#ffffff'];
      const amt = isWin ? 60 : 20;
      for(let i=0; i<amt; i++) {
        pts.push({
          x: x || fxc.width/2, 
          y: y || fxc.height/2,
          vx: (Math.random()-0.5)*(isWin ? 25 : 15), 
          vy: (Math.random()-0.5)*(isWin ? 25 : 15) - (isWin ? 8 : 2),
          c: colors[Math.floor(Math.random()*colors.length)],
          s: Math.random()*8+5, 
          life: 1, 
          type: isWin ? 'fw' : 'conf'
        });
      }
    };
    
    const loopFX = () => {
      ctx.clearRect(0,0,fxc.width,fxc.height);
      for(let i=pts.length-1; i>=0; i--) {
        let p = pts[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += (p.type === 'fw') ? 0.5 : 0.2; // Gravity
        p.life -= 0.015;
        ctx.fillStyle = p.c;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
        ctx.fill();
        if(p.life <= 0) pts.splice(i,1);
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(loopFX);
    };
    loopFX();

    // Lobby Random Explosions
    let lobbyFxTimer = setInterval(() => {
        if ($('#lobby').classList.contains('active')) {
            spawnFX(Math.random() * fxc.width, Math.random() * (fxc.height*0.7), Math.random() > 0.5);
            if (actx && Math.random() > 0.4) playSFX(300 + Math.random()*600, 30, 0.1, 'square');
        }
    }, 1200);

    /* --- Button SFX & FX Wrappers --- */
    document.querySelectorAll('.btn').forEach(b => {
      b.addEventListener('pointerdown', (e) => {
        sfxClick();
        const r = b.getBoundingClientRect();
        spawnFX(e.clientX - r.left + b.offsetLeft, e.clientY - r.top + b.offsetTop, false);
      });
    });

    // Solo Mode logic
    $('#soloBtn').onclick = () => { 
      isSolo = true; 
      host = true; 
      dc = { send: () => {} }; 
      opp = 10; // LIVES for solo mode
      $('.hud').innerHTML = `<div>WINS <b id="ms">0</b></div><div style="font-size:16px;text-align:center;line-height:1.1;color:#aaa">SPD<br><b id="spd" style="color:#fff">--</b>s</div><div>LIVES <b id="os">10</b></div>`;
      $('#lobby').classList.remove('active'); 
      $('#game').classList.add('active'); 
      setTimeout(next, 800); 
    };
    
    $('#hostBtn').onclick = async () => { host = true; $('#hostP').style.display = 'block'; $('#hostBtn').style.display = 'none'; $('#joinBtn').style.display = 'none'; $('#soloBtn').style.display = 'none'; pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }); dc = pc.createDataChannel('d'); setup(); const o = await pc.createOffer(); await pc.setLocalDescription(o); pc.onicecandidate = e => { if (!e.candidate) $('#offOut').value = btoa(JSON.stringify(pc.localDescription)) }; $('#stat').textContent = 'Share offer...' };
    $('#joinBtn').onclick = () => { $('#joinP').style.display = 'block'; $('#hostBtn').style.display = 'none'; $('#joinBtn').style.display = 'none'; $('#soloBtn').style.display = 'none'; };
    $('#makeBtn').onclick = async () => { const o = JSON.parse(atob($('#offIn').value.trim())); pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }); pc.ondatachannel = e => { dc = e.channel; setup() }; await pc.setRemoteDescription(o); const a = await pc.createAnswer(); await pc.setLocalDescription(a); pc.onicecandidate = e => { if (!e.candidate) { $('#ansOut').style.display = 'block'; $('#copyAns').style.display = 'block'; $('#ansOut').value = btoa(JSON.stringify(pc.localDescription)) } }; $('#stat').textContent = 'Share answer back...' };
    $('#goBtn').onclick = async () => { await pc.setRemoteDescription(JSON.parse(atob($('#ansIn').value.trim()))) };
    
    function setup() { 
      dc.onopen = () => { 
        $('#lobby').classList.remove('active'); 
        $('#game').classList.add('active'); 
        if (host) setTimeout(next, 800) 
      }; 
      dc.onmessage = e => { 
        const m = JSON.parse(e.data); 
        if (m.t === 'r') play(m); 
        if (m.t === 's') end(m) 
      } 
    }
    
    function next() { 
      if (isSolo) {
        if (opp <= 0) return end({ my, opp, isSolo: true });
        rnd++; // Increment round visually for solo
      } else {
        if (my >= 5 || opp >= 5 || rnd > 9) { dc.send(JSON.stringify({ t: 's', my, opp })); return end({ my, opp }) } 
      }

      // Speed up BGM as rounds increase!
      bgmTempo = Math.max(90, 220 - (rnd * 8));

      const list = ['fly', 'dont', 'pop', 'catch', 'dodge', 'swipe', 'triple', 'hold', 'mash', 'trace', 'match', 'avoid', 'pump', 'whack', 'stop', 'drag', 'scratch', 'find', 'feed', 'order']; 
      let g; do { g = list[Math.floor(Math.random() * list.length)] } while (g === last); 
      last = g; 
      const d = { t: 'r', g, rnd, at: Date.now() + 900 }; 
      if (!isSolo) dc.send(JSON.stringify(d)); 
      play(d) 
    }
    
    function play(d) { 
      rnd = d.rnd; 
      if (!isSolo) $('#rn').textContent = rnd; 
      $('#gameArea').innerHTML = ''; 
      const i = document.createElement('div'); 
      i.className = 'instr'; 
      i.textContent = games[d.g].i; 
      $('#gameArea').appendChild(i); 
      sfxStartRound();
      
      setTimeout(() => { 
        i.remove(); 
        const startT = Date.now();
        games[d.g].f().then(r => { 
          r.time = (Date.now() - startT) / 1000;
          if (!isSolo) dc.send(JSON.stringify({ t: 's', r })); 
          show(r) 
        }) 
      }, 850) 
    }
    
    function show(r) { 
      if (r.w) { 
        my++; 
        if (isSolo) {
          times.push(r.time);
          $('#spd').textContent = r.time.toFixed(2);
        }
        spawnFX(fxc.width/2, fxc.height/2 + 50, true); 
        sfxWin();
      } else { 
        if (isSolo) opp--; else opp++; 
        sfxLose();
      } 
      
      $('#ms').textContent = my; 
      $('#os').textContent = opp; 
      const d = document.createElement('div'); 
      d.className = 'instr'; 
      d.style.fontSize = 'clamp(40px, 18vw, 100px)'; 
      d.textContent = r.w ? 'WIN!' : (isSolo ? 'FAIL!' : 'LOSE'); 
      $('#gameArea').appendChild(d); 
      
      setTimeout(() => { 
        d.remove(); 
        if (host) { if(!isSolo) rnd++; next() } 
      }, 1200) 
    }
    
    function end(m) { 
      bgmTempo = 300; // Slow sad/happy tempo for end
      if (m.isSolo) {
        const avg = times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(2) : '--';
        $('#gameArea').innerHTML = `<div class="instr" style="font-size:clamp(40px, 16vw, 90px);">GAME OVER<br><span style="font-size:clamp(20px, 8vw, 40px)">WINS: ${m.my} <br> AVG TIME: ${avg}s</span></div>`;
        return;
      }
      const isVic = m.my > m.opp;
      $('#gameArea').innerHTML = `<div class="instr" style="font-size:clamp(40px, 16vw, 90px);">${isVic ? 'VICTORY' : 'DEFEAT'}<br><span style="font-size:clamp(30px, 10vw, 60px)">${m.my}-${m.opp}</span></div>`;
      if (isVic) {
        let fwInt = setInterval(() => spawnFX(Math.random() * fxc.width, Math.random() * fxc.height * 0.6 + fxc.height * 0.2, true), 350);
        setTimeout(() => clearInterval(fwInt), 3500);
      }
    }
    
    /* --- THE MINIGAMES --- */
    const games = {
      fly: { i: 'TAP!', f: () => new Promise(res => { const a = $('#gameArea'); a.innerHTML = ''; const f = document.createElement('div'); f.className = 'fly'; f.textContent = '🪰'; a.appendChild(f); const mv = () => { f.style.left = Math.random() * 80 + '%'; f.style.top = Math.random() * 70 + '%' }; mv(); const iv = setInterval(mv, 400); const t = setTimeout(() => { clearInterval(iv); res({ w: 0 }) }, 3500); f.onclick = () => { clearInterval(iv); clearTimeout(t); sfxClick(); res({ w: 1 }) } }) },
      dont: { i: "DON'T!", f: () => new Promise(res => { const a = $('#gameArea'); a.innerHTML = '<div class="dontbtn">DON\'T</div>'; let ok = true; a.onpointerdown = () => ok = false; setTimeout(() => res({ w: ok ? 1 : 0 }), 3000) }) },
      pop: { i: 'POP!', f: () => new Promise(res => { const a = $('#gameArea'); a.innerHTML = ''; let c = 0; for (let i = 0; i < 7; i++) { const b = document.createElement('div'); b.className = 'balloon'; b.textContent = '🎈'; b.style.left = 5 + i * 13 + '%'; b.style.bottom = '-20%'; b.style.animationDelay = i * .2 + 's'; b.onclick = () => { sfxClick(); b.style.transform = 'scale(0)'; setTimeout(()=>b.remove(), 100); c++; if (c >= 7) res({ w: 1 }) }; a.appendChild(b) } setTimeout(() => res({ w: c >= 7 ? 1 : 0 }), 3800) }) },
