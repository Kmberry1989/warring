<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WARRING</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <style>
    :root {
      --y: #FFD400;
      --p: #7B2CF5;
      --g: #00E676;
      --r: #FF1744;
      --b: #00B0FF;
      --blk: #111
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #1a0030;
      overscroll-behavior: none
    }

    body {
      font-family: Impact, 'Arial Black', system-ui, sans-serif;
      color: #fff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none
    }

    #app {
      max-width: 500px;
      margin: 0 auto;
      height: 100dvh;
      background: var(--y);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column
    }

    .screen.active {
      display: flex
    }

    .logo {
      margin: 22px auto 8px;
      text-align: center;
      transform: rotate(-3deg);
      filter: drop-shadow(0 6px 0 #000)
    }

    .logo span {
      display: block;
      font-size: clamp(48px, 16vw, 78px);
      line-height: .78;
      padding: 6px 16px;
      border: 5px solid #000;
      font-weight: 900;
      letter-spacing: 1px
    }

    .logo span:first-child {
      background: #fff;
      color: var(--p);
      transform: rotate(2deg) translateY(3px)
    }

    .logo span:last-child {
      background: var(--r);
      color: #fff;
      transform: rotate(-2deg) translateY(-3px);
      margin-top: -5px
    }

    .card {
      background: #fff;
      color: #000;
      margin: 10px 16px;
      padding: 16px;
      border: 4px solid #000;
      border-radius: 20px;
      box-shadow: 0 7px 0 #000
    }

    .btn {
      width: 100%;
      padding: 15px;
      font-size: 21px;
      font-weight: 900;
      border: 4px solid #000;
      border-radius: 14px;
      margin: 7px 0;
      box-shadow: 0 5px 0 #000;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #000
    }

    .blue {
      background: var(--b);
      color: #fff
    }

    .yellow {
      background: var(--y);
      color: #000
    }

    textarea {
      width: 100%;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      padding: 8px;
      border: 3px solid #000;
      border-radius: 10px;
      background: #fffbe5;
      margin: 6px 0
    }

    .hud {
      height: 54px;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
      font-size: 19px;
      border-bottom: 4px solid #fff;
      letter-spacing: .5px
    }

    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111
    }

    .instr {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24vw;
      font-weight: 900;
      color: #fff;
      -webkit-text-stroke: 7px #000;
      text-shadow: 0 8px 0 #000;
      pointer-events: none
    }

    .fly {
      position: absolute;
      font-size: 18vw;
      transition: .25s;
      filter: drop-shadow(0 5px 0 #000)
    }

    .balloon {
      position: absolute;
      font-size: 16vw;
      animation: up 2.8s linear forwards
    }

    @keyframes up {
      to {
        transform: translateY(-120vh)
      }
    }

    .basket {
      position: absolute;
      bottom: 20px;
      font-size: 15vw;
      transform: translateX(-50%);
      filter: drop-shadow(0 4px 0 #000)
    }

    .toast {
      position: absolute;
      font-size: 12vw
    }

    .player {
      position: absolute;
      bottom: 24px;
      font-size: 14vw;
      transform: translateX(-50%)
    }

    .banana {
      position: absolute;
      font-size: 11vw
    }

    .dontbtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44vw;
      height: 44vw;
      background: var(--r);
      border: 6px solid #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8vw;
      color: #fff;
      box-shadow: 0 8px 0 #000
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="lobby" class="screen active">
      <div class="logo"><span>WARIO</span><span>DUEL</span></div>
      <div class="card">
        <button id="hostBtn" class="btn blue">HOST GAME</button>
        <button id="joinBtn" class="btn yellow">JOIN GAME</button>
        <div id="hostP" style="display:none">
          <p><b>1. Send this OFFER:</b></p><textarea id="offOut" rows="3" readonly></textarea><button class="btn yellow"
            onclick="navigator.clipboard.writeText(offOut.value)">COPY</button>
          <p><b>2. Paste ANSWER:</b></p><textarea id="ansIn" rows="3"></textarea><button id="goBtn"
            class="btn blue">CONNECT</button>
        </div>
        <div id="joinP" style="display:none">
          <p>Paste OFFER:</p><textarea id="offIn" rows="3"></textarea><button id="makeBtn" class="btn blue">MAKE
            ANSWER</button>
          <textarea id="ansOut" rows="3" readonly style="display:none"></textarea><button id="copyAns"
            class="btn yellow" style="display:none" onclick="navigator.clipboard.writeText(ansOut.value)">COPY
            ANSWER</button>
        </div>
        <p id="stat" style="text-align:center;font-family:system-ui;font-size:13px"></p>
      </div>
    </div>
    <div id="game" class="screen">
      <div class="hud">
        <div>YOU <b id="ms">0</b></div>
        <div>R<b id="rn">1</b>/9</div>
        <div>OPP <b id="os">0</b></div>
      </div>
      <div id="gameArea"></div>
    </div>
  </div>
  <script>
    const $ = s => document.querySelector(s); let pc, dc, host = false, my = 0, opp = 0, rnd = 1, last = ''; const beep = (f, d) => { try { const a = new (window.AudioContext || webkitAudioContext)(), o = a.createOscillator(), g = a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value = f; g.gain.value = .15; o.start(); o.stop(a.currentTime + d / 1000) } catch { } };
    $('#hostBtn').onclick = async () => { host = true; $('#hostP').style.display = 'block'; $('#hostBtn').style.display = 'none'; $('#joinBtn').style.display = 'none'; pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }); dc = pc.createDataChannel('d'); setup(); const o = await pc.createOffer(); await pc.setLocalDescription(o); pc.onicecandidate = e => { if (!e.candidate) $('#offOut').value = btoa(JSON.stringify(pc.localDescription)) }; $('#stat').textContent = 'Share offer...' };
    $('#joinBtn').onclick = () => { $('#joinP').style.display = 'block'; $('#hostBtn').style.display = 'none'; $('#joinBtn').style.display = 'none'; };
    $('#makeBtn').onclick = async () => { const o = JSON.parse(atob($('#offIn').value.trim())); pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }); pc.ondatachannel = e => { dc = e.channel; setup() }; await pc.setRemoteDescription(o); const a = await pc.createAnswer(); await pc.setLocalDescription(a); pc.onicecandidate = e => { if (!e.candidate) { $('#ansOut').style.display = 'block'; $('#copyAns').style.display = 'block'; $('#ansOut').value = btoa(JSON.stringify(pc.localDescription)) } }; $('#stat').textContent = 'Share answer back...' };
    $('#goBtn').onclick = async () => { await pc.setRemoteDescription(JSON.parse(atob($('#ansIn').value.trim()))) };
    function setup() { dc.onopen = () => { $('#lobby').classList.remove('active'); $('#game').classList.add('active'); if (host) setTimeout(next, 800) }; dc.onmessage = e => { const m = JSON.parse(e.data); if (m.t === 'r') play(m); if (m.t === 's') end(m) } }
    function next() { if (my >= 5 || opp >= 5 || rnd > 9) { dc.send(JSON.stringify({ t: 's', my, opp })); return end({ my, opp }) } const list = ['fly', 'dont', 'pop', 'catch', 'dodge', 'swipe', 'triple', 'hold', 'shake', 'trace', 'match', 'avoid', 'pump', 'whack', 'stop', 'drag', 'scratch', 'tilt']; let g; do { g = list[Math.floor(Math.random() * list.length)] } while (g === last); last = g; const d = { t: 'r', g, rnd, at: Date.now() + 900 }; dc.send(JSON.stringify(d)); play(d) }
    function play(d) { rnd = d.rnd; $('#rn').textContent = rnd; $('#gameArea').innerHTML = ''; const i = document.createElement('div'); i.className = 'instr'; i.textContent = games[d.g].i; $('#gameArea').appendChild(i); beep(800, 70); setTimeout(() => { i.remove(); games[d.g].f().then(r => { dc.send(JSON.stringify({ t: 's', r })); show(r) }) }, 700) }

      catch: { i: 'CATCH!', f: () => new Promise(res => { const a = $('#gameArea'); a.innerHTML = ''; const p = document.createElement('div'); p.className = 'basket'; p.textContent = '🧺'; p.style.left = '50%'; a.appendChild(p); let x = 50; const mv = e => { const r = a.getBoundingClientRect(); x = ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) / r.width * 100; p.style.left = x + '%' }; a.onpointermove = mv; a.ontouchmove = mv; let c = 0; const drop = () => { const t = document.createElement('div'); t.className = 'toast'; t.textContent = '🍞'; t.style.left = Math.random() * 80 + 10 + '%'; t.style.top = '0%'; a.appendChild(t); let y = 0; const iv = setInterval(() => { y += 2.5; t.style.top = y + '%'; if (y > 75 && Math.abs(parseFloat(t.style.left) - x) < 12) { clearInterval(iv); t.remove(); c++; if (c >= 3) { clearInterval(sp); res({ w: 1 }) } } if (y > 95) { clearInterval(iv); t.remove() } }, 30) }; const sp = setInterval(drop, 700); drop(); setTimeout(() => { clearInterval(sp); res({ w: c >= 3 ? 1 : 0 }) }, 4000) }) },

      shake: { i: 'SHAKE!', f: () => new Promise(r => { const a = $('#gameArea'); a.innerHTML = '<div class="instr" style="font-size:14vw">SHAKE!</div>'; let c = 0, last = 0; const h = e => { const g = e.accelerationIncludingGravity; if (!g) return; if (Math.abs(g.x) + Math.abs(g.y) > 25 && Date.now() - last > 120) { c++; last = Date.now() } }; window.addEventListener('devicemotion', h); a.onclick = () => c += 2; setTimeout(() => { window.removeEventListener('devicemotion', h); r({ w: c > 10 ? 1 : 0 }) }, 2800) }) },
      trace: { i: 'CIRCLE!', f: () => new Promise(r => { const a = $('#gameArea'); a.innerHTML = '<canvas id="cv" width="300" height="300" style="touch-action:none"></canvas>'; const c = $('#cv'), x = c.getContext('2d'), s = 150; let d = false, p = 0; x.lineWidth = 12; x.strokeStyle = '#fff'; x.beginPath(); x.arc(s, s, 100, 0, Math.PI * 2); x.stroke(); x.globalCompositeOperation = 'destination-out'; const m = e => { if (!d) return; const r = c.getBoundingClientRect(); const X = (e.touches ? e.touches[0].clientX : e.clientX) - r.left; const Y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top; x.beginPath(); x.arc(X, Y, 18, 0, 7); x.fill(); p++ }; c.onpointerdown = () => d = true; c.onpointerup = () => d = false; c.onpointermove = m; c.ontouchstart = () => d = true; c.ontouchend = () => d = false; c.ontouchmove = m; setTimeout(() => r({ w: p > 80 ? 1 : 0 }), 3000) }) },
      match: { i: 'PAIR!', f: () => new Promise(r => { const a = $('#gameArea'); a.innerHTML = ''; const e = ['🍎', '🍎', '🍌', '🍌', '🍇', '🍇'].sort(() => Math.random() - .5); let o = null, found = 0; e.forEach((v, i) => { const d = document.createElement('div'); d.textContent = '❓'; d.style.cssText = 'position:absolute;font-size:14vw;left:' + (10 + (i % 3) * 30) + '%;top:' + (20 + Math.floor(i / 3) * 35) + '%;'; d.onclick = () => { d.textContent = v; if (!o) { o = d } else { if (o.textContent === v && o !== d) { found++; o = null; if (found === 3) r({ w: 1 }) } else { setTimeout(() => { o.textContent = '❓'; d.textContent = '❓'; o = null }, 400) } } }; a.appendChild(d) }); setTimeout(() => r({ w: found === 3 ? 1 : 0 }), 4000) }) },

  </script>

</html>
