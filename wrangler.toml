name = "warring"
main = "rooms-worker.js"
compatibility_date = "2026-05-12"
workers_dev = true
preview_urls = false

[assets]
directory = "./public"
run_worker_first = ["/api/*"]

[[durable_objects.bindings]]
name = "ROOM_DO"
class_name = "RoomState"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomState"]

[vars]
PUBLIC_BASE_URL = "https://warring.kylematthewberry.workers.dev"
